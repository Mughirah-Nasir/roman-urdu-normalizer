<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 580" font-family="system-ui, sans-serif">
  <rect width="1100" height="580" fill="#0f0e0c"/>
  <radialGradient id="bg" cx="50%" cy="0%" r="80%">
    <stop offset="0%" stop-color="#e8a33d" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#0f0e0c" stop-opacity="0"/>
  </radialGradient>
  <rect width="1100" height="580" fill="url(#bg)"/>

  <text x="60" y="60" fill="#e8a33d" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="2">
    ROMAN URDU NORMALIZER · ARCHITECTURE
  </text>
  <text x="60" y="100" fill="#f5efe3" font-family="Georgia, serif" font-size="28" font-weight="500" letter-spacing="-0.5">
    Three-layer resolution pipeline
  </text>

  <!-- Input -->
  <rect x="60" y="160" width="200" height="80" fill="#181613" stroke="#2a261f" rx="4"/>
  <text x="160" y="190" fill="#6e685c" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="1" text-anchor="middle">INPUT</text>
  <text x="160" y="218" fill="#f5efe3" font-family="'JetBrains Mono', monospace" font-size="13" text-anchor="middle">"yr bht kya"</text>

  <!-- Arrow 1 -->
  <line x1="260" y1="200" x2="320" y2="200" stroke="#e8a33d" stroke-width="2"/>
  <polygon points="320,200 312,196 312,204" fill="#e8a33d"/>

  <!-- Layer 1 -->
  <rect x="330" y="140" width="240" height="120" fill="#181613" stroke="#e8a33d" stroke-width="1.5" rx="4"/>
  <text x="350" y="168" fill="#e8a33d" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="1.5">LAYER 1</text>
  <text x="350" y="194" fill="#f5efe3" font-family="Georgia, serif" font-size="18" font-weight="500">Variant map</text>
  <text x="350" y="218" fill="#b8b0a1" font-size="12">Exact O(1) dictionary lookup.</text>
  <text x="350" y="234" fill="#b8b0a1" font-size="12">Catches SMS shorthand:</text>
  <text x="350" y="250" fill="#d4a056" font-family="'JetBrains Mono', monospace" font-size="11">  bht → bahut · yr → yaar</text>

  <!-- Arrow miss -->
  <line x1="450" y1="260" x2="450" y2="310" stroke="#5fb39a" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="460" y="285" fill="#5fb39a" font-family="'JetBrains Mono', monospace" font-size="10">no match →</text>

  <!-- Layer 2 -->
  <rect x="330" y="320" width="240" height="140" fill="#181613" stroke="#5fb39a" stroke-width="1.5" rx="4"/>
  <text x="350" y="348" fill="#5fb39a" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="1.5">LAYER 2</text>
  <text x="350" y="374" fill="#f5efe3" font-family="Georgia, serif" font-size="18" font-weight="500">Phonetic key</text>
  <text x="350" y="398" fill="#b8b0a1" font-size="12">Reduce word to sound-skeleton:</text>
  <text x="350" y="414" fill="#5fb39a" font-family="'JetBrains Mono', monospace" font-size="11">  digraph fold (kh, gh, sh, ch)</text>
  <text x="350" y="430" fill="#5fb39a" font-family="'JetBrains Mono', monospace" font-size="11">  vowel collapse (a/aa, i/y/e)</text>
  <text x="350" y="446" fill="#5fb39a" font-family="'JetBrains Mono', monospace" font-size="11">  index lookup over 655 words</text>

  <!-- Arrow miss -->
  <line x1="450" y1="460" x2="450" y2="500" stroke="#c97a4c" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="460" y="485" fill="#c97a4c" font-family="'JetBrains Mono', monospace" font-size="10">no match →</text>

  <!-- Layer 3 -->
  <rect x="330" y="510" width="240" height="50" fill="#181613" stroke="#c97a4c" stroke-width="1.5" rx="4"/>
  <text x="350" y="535" fill="#c97a4c" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="1.5">LAYER 3</text>
  <text x="350" y="552" fill="#f5efe3" font-family="Georgia, serif" font-size="16" font-weight="500">Unknown — pass through, flag</text>

  <!-- Right side: outputs -->
  <line x1="570" y1="200" x2="630" y2="200" stroke="#e8a33d" stroke-width="2"/>
  <polygon points="630,200 622,196 622,204" fill="#e8a33d"/>

  <line x1="570" y1="390" x2="630" y2="390" stroke="#5fb39a" stroke-width="2"/>
  <polygon points="630,390 622,386 622,394" fill="#5fb39a"/>

  <line x1="570" y1="535" x2="630" y2="535" stroke="#c97a4c" stroke-width="2"/>
  <polygon points="630,535 622,531 622,539" fill="#c97a4c"/>

  <!-- Output examples -->
  <rect x="640" y="160" width="280" height="80" fill="#181613" stroke="#2a261f" rx="4"/>
  <text x="660" y="186" fill="#6e685c" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="1">EXAMPLE OUTPUT (Layer 1)</text>
  <text x="660" y="212" fill="#d4a056" font-family="'JetBrains Mono', monospace" font-size="12">{ "yr": "yaar",</text>
  <text x="660" y="228" fill="#d4a056" font-family="'JetBrains Mono', monospace" font-size="12">  "source": "variant_map" }</text>

  <rect x="640" y="350" width="280" height="80" fill="#181613" stroke="#2a261f" rx="4"/>
  <text x="660" y="376" fill="#6e685c" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="1">EXAMPLE OUTPUT (Layer 2)</text>
  <text x="660" y="402" fill="#5fb39a" font-family="'JetBrains Mono', monospace" font-size="12">{ "kyaa": "kya",</text>
  <text x="660" y="418" fill="#5fb39a" font-family="'JetBrains Mono', monospace" font-size="12">  "source": "phonetic" }</text>

  <rect x="640" y="495" width="280" height="80" fill="#181613" stroke="#2a261f" rx="4"/>
  <text x="660" y="521" fill="#6e685c" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="1">EXAMPLE OUTPUT (Layer 3)</text>
  <text x="660" y="547" fill="#c97a4c" font-family="'JetBrains Mono', monospace" font-size="12">{ "xyzqwerty": "xyzqwerty",</text>
  <text x="660" y="563" fill="#c97a4c" font-family="'JetBrains Mono', monospace" font-size="12">  "source": "unknown" }</text>

  <!-- Footer rule -->
  <text x="60" y="290" fill="#6e685c" font-family="'JetBrains Mono', monospace" font-size="10">
    Resolution stops at the first matching layer.
  </text>
  <text x="60" y="306" fill="#6e685c" font-family="'JetBrains Mono', monospace" font-size="10">
    No silent guessing. No retroactive overrides.
  </text>

  <text x="940" y="565" fill="#6e685c" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="end">
    M. Nasir · 2026 · v1.0.0
  </text>
</svg>
