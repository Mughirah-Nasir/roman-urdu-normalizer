<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="system-ui, sans-serif">
  <rect width="1100" height="720" fill="#0f0e0c"/>
  <radialGradient id="bg" cx="50%" cy="0%" r="80%">
    <stop offset="0%" stop-color="#e8a33d" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#0f0e0c" stop-opacity="0"/>
  </radialGradient>
  <rect width="1100" height="720" fill="url(#bg)"/>

  <text x="60" y="60" fill="#e8a33d" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="2">
    ROMAN URDU NORMALIZER · ARCHITECTURE · v1.2.1
  </text>
  <text x="60" y="100" fill="#f5efe3" font-family="Georgia, serif" font-size="28" font-weight="500" letter-spacing="-0.5">
    Four-layer resolution pipeline
  </text>
  <text x="60" y="128" fill="#b8b0a1" font-size="13">
    Each token tried in order. First confident match wins. Never silently guesses.
  </text>

  <!-- Input -->
  <rect x="60" y="170" width="200" height="80" fill="#181613" stroke="#2a261f" rx="4"/>
  <text x="160" y="200" fill="#6e685c" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="1" text-anchor="middle">INPUT</text>
  <text x="160" y="228" fill="#f5efe3" font-family="'JetBrains Mono', monospace" font-size="13" text-anchor="middle">"yr kr rha hun"</text>

  <!-- Arrow into Layer 1 -->
  <line x1="260" y1="210" x2="320" y2="210" stroke="#e8a33d" stroke-width="2"/>
  <polygon points="320,210 312,206 312,214" fill="#e8a33d"/>

  <!-- Layer 1 — Phrase map -->
  <rect x="330" y="160" width="260" height="100" fill="#181613" stroke="#e8a33d" stroke-width="1.5" rx="4"/>
  <text x="350" y="186" fill="#e8a33d" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="1.5">LAYER 1 · PHRASE MAP</text>
  <text x="350" y="210" fill="#f5efe3" font-family="Georgia, serif" font-size="17" font-weight="500">Multi-token rewrites</text>
  <text x="350" y="232" fill="#b8b0a1" font-size="12">Longest match wins, then per-token.</text>
  <text x="350" y="250" fill="#d4a056" font-family="'JetBrains Mono', monospace" font-size="11">  kr rha → kar raha · ho gya → ho gaya</text>

  <!-- Arrow no match -->
  <line x1="460" y1="260" x2="460" y2="300" stroke="#5fb39a" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="468" y="285" fill="#5fb39a" font-family="'JetBrains Mono', monospace" font-size="10">no match →</text>

  <!-- Layer 2 — Variant map -->
  <rect x="330" y="310" width="260" height="100" fill="#181613" stroke="#e8a33d" stroke-width="1.5" rx="4"/>
  <text x="350" y="336" fill="#e8a33d" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="1.5">LAYER 2 · VARIANT MAP</text>
  <text x="350" y="360" fill="#f5efe3" font-family="Georgia, serif" font-size="17" font-weight="500">Exact dictionary lookup</text>
  <text x="350" y="382" fill="#b8b0a1" font-size="12">~430 curated SMS shorthand entries.</text>
  <text x="350" y="400" fill="#d4a056" font-family="'JetBrains Mono', monospace" font-size="11">  bht → bahut · yr → yaar · nhi → nahi</text>

  <line x1="460" y1="410" x2="460" y2="450" stroke="#5fb39a" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="468" y="435" fill="#5fb39a" font-family="'JetBrains Mono', monospace" font-size="10">no match →</text>

  <!-- Layer 3 — Phonetic key -->
  <rect x="330" y="460" width="260" height="100" fill="#181613" stroke="#5fb39a" stroke-width="1.5" rx="4"/>
  <text x="350" y="486" fill="#5fb39a" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="1.5">LAYER 3 · PHONETIC KEY</text>
  <text x="350" y="510" fill="#f5efe3" font-family="Georgia, serif" font-size="17" font-weight="500">Algorithmic vowel collapse</text>
  <text x="350" y="532" fill="#b8b0a1" font-size="12">Digraph + vowel-class folding, then lookup.</text>
  <text x="350" y="550" fill="#7cc4ad" font-family="'JetBrains Mono', monospace" font-size="11">  kia / kyaa / kayya → "kya"</text>

  <line x1="460" y1="560" x2="460" y2="600" stroke="#c75d4f" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="468" y="585" fill="#c75d4f" font-family="'JetBrains Mono', monospace" font-size="10">still no match →</text>

  <!-- Layer 4 — Unknown -->
  <rect x="330" y="610" width="260" height="80" fill="#181613" stroke="#c75d4f" stroke-width="1.5" rx="4"/>
  <text x="350" y="636" fill="#c75d4f" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="1.5">LAYER 4 · UNKNOWN (PASS-THROUGH)</text>
  <text x="350" y="660" fill="#f5efe3" font-family="Georgia, serif" font-size="16" font-weight="500">Flag, do not guess</text>
  <text x="350" y="680" fill="#b8b0a1" font-size="12">confidence=0.0, source="unknown"</text>

  <!-- Right side: output structure -->
  <line x1="600" y1="210" x2="660" y2="210" stroke="#e8a33d" stroke-width="2"/>
  <polygon points="660,210 652,206 652,214" fill="#e8a33d"/>

  <rect x="670" y="160" width="370" height="530" fill="#181613" stroke="#2a261f" rx="4"/>
  <text x="690" y="186" fill="#6e685c" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="1.5">JSON RESPONSE</text>
  <text x="690" y="210" fill="#f5efe3" font-family="Georgia, serif" font-size="17" font-weight="500">Per-token transparency</text>

  <text x="690" y="240" fill="#b8b0a1" font-size="12">Every token in the output carries:</text>
  <text x="700" y="262" fill="#d4a056" font-family="'JetBrains Mono', monospace" font-size="11">  original</text>
  <text x="700" y="280" fill="#d4a056" font-family="'JetBrains Mono', monospace" font-size="11">  normalized</text>
  <text x="700" y="298" fill="#d4a056" font-family="'JetBrains Mono', monospace" font-size="11">  source       (which layer matched)</text>
  <text x="700" y="316" fill="#d4a056" font-family="'JetBrains Mono', monospace" font-size="11">  confidence   (0.0 – 1.0)</text>
  <text x="700" y="334" fill="#d4a056" font-family="'JetBrains Mono', monospace" font-size="11">  ambiguous    (homograph flag)</text>
  <text x="700" y="352" fill="#d4a056" font-family="'JetBrains Mono', monospace" font-size="11">  span_tokens  (>1 for phrase matches)</text>

  <text x="690" y="396" fill="#b8b0a1" font-size="12">Plus per-response stats:</text>
  <text x="700" y="418" fill="#7cc4ad" font-family="'JetBrains Mono', monospace" font-size="11">  total · variant_map · phrase_map</text>
  <text x="700" y="436" fill="#7cc4ad" font-family="'JetBrains Mono', monospace" font-size="11">  phonetic · unchanged · unknown</text>
  <text x="700" y="454" fill="#7cc4ad" font-family="'JetBrains Mono', monospace" font-size="11">  ambiguous · avg_confidence</text>
  <text x="700" y="472" fill="#7cc4ad" font-family="'JetBrains Mono', monospace" font-size="11">  min_confidence</text>

  <line x1="690" y1="510" x2="1020" y2="510" stroke="#2a261f"/>
  <text x="690" y="540" fill="#6e685c" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="1.5">DESIGN CONTRACT</text>
  <text x="690" y="562" fill="#f5efe3" font-family="Georgia, serif" font-size="14" font-style="italic">"Never silently guess."</text>
  <text x="690" y="584" fill="#b8b0a1" font-size="12">If no layer is confident, the token</text>
  <text x="690" y="602" fill="#b8b0a1" font-size="12">passes through unchanged and is flagged.</text>
  <text x="690" y="620" fill="#b8b0a1" font-size="12">Downstream systems can threshold on</text>
  <text x="690" y="638" fill="#b8b0a1" font-size="12">confidence and decide what to do.</text>

  <!-- Footer -->
  <text x="60" y="700" fill="#5b554a" font-family="'JetBrains Mono', monospace" font-size="10">
    162 tests · F1 90.1% (combined) · F1 89.3% (blind held-out) · Mughirah Nasir · NUST SEECS · 2026
  </text>
</svg>
